name: Bug report
description: Report a bug or behavioral regression in FP-DCF.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Include the command, input, or workflow needed to reproduce the issue.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: valuation-context
    attributes:
      label: Valuation context
      description: If relevant, note the ticker, market, model, and assumption path involved.

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant error output or screenshots.
